version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: ubar-postgres
    environment:
      POSTGRES_USER: ubar
      POSTGRES_PASSWORD: ubar_password
      POSTGRES_DB: ubar
    ports:
      - "5432:5432"
    volumes:
      - ubar_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ubar_data:
